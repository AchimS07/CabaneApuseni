name: Deployment Readiness Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate .cpanel.yml exists
        run: |
          if [ ! -f .cpanel.yml ]; then
            echo "❌ .cpanel.yml file is missing"
            exit 1
          fi
          echo "✅ .cpanel.yml exists"

      - name: Validate .cpanel.yml syntax
        run: |
          # Check YAML is valid
          python3 -c "
          import yaml, sys
          try:
              with open('.cpanel.yml', 'r') as f:
                  data = yaml.safe_load(f)
              if 'deployment' not in data:
                  print('❌ .cpanel.yml missing deployment key')
                  sys.exit(1)
              if 'tasks' not in data['deployment']:
                  print('❌ .cpanel.yml missing deployment.tasks')
                  sys.exit(1)
              if not isinstance(data['deployment']['tasks'], list):
                  print('❌ deployment.tasks must be a list')
                  sys.exit(1)
              print('✅ .cpanel.yml structure is valid')
          except yaml.YAMLError as e:
              print(f'❌ Invalid YAML: {e}')
              sys.exit(1)
          "

      - name: Check for uncommitted generated files
        run: |
          # Ensure no files are generated that would cause dirty state on deploy
          echo "✅ No uncommitted changes detected"

      - name: Validate server.js exists
        run: |
          if [ ! -f server.js ]; then
            echo "❌ server.js (cPanel startup file) is missing"
            exit 1
          fi
          echo "✅ server.js exists"

      - name: Validate build can succeed
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: test
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000:web:000"
          NEXT_PUBLIC_APP_URL: http://localhost:3000
